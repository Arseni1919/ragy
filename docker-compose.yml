version: '3.8'

services:
  ragy-api:
    build: .
    container_name: ragy-api
    ports:
      - "8000:8000"
    environment:
      # Required
      - TAVILY_API_KEY=${TAVILY_API_KEY}

      # Optional API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}

      # Embedding Configuration
      - HF_EMB_MODEL=${HF_EMB_MODEL:-all-MiniLM-L6-v2}

      # Database & Paths
      - DB_PATH=/app/ragy_db
      - JOBS_DB_PATH=/app/ragy_jobs.db

      # Performance
      - RAGY_MAX_CONCURRENT=${RAGY_MAX_CONCURRENT:-3}

      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000

      # Scheduler
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-2}
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-UTC}

    volumes:
      # Persistent data directories
      - ./ragy_db:/app/ragy_db
      - ./ragy_jobs.db:/app/ragy_jobs.db

      # Model cache (speeds up restarts)
      - models_cache:/home/ragy/.cache/huggingface

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

volumes:
  models_cache:
    driver: local
